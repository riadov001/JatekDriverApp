kind = "web"
previewPath = "/jatek-client/"
title = "Jatek Client"
version = "1.0.0"
id = "artifacts/jatek-client"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/jatek-client/" ]
localPort = 23801

[services.development]
run = "pnpm --filter @workspace/jatek-client run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jatek-client", "run", "build" ]
publicDir = "artifacts/jatek-client/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23801"
BASE_PATH = "/jatek-client/"
