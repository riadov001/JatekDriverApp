kind = "mobile"
previewPath = "/jatek-driver/"
title = "Jatek Driver"
version = "1.0.0"
id = "artifacts/jatek-driver"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/jatek-driver/" ]
localPort = 21669

[services.development]
run = "pnpm --filter @workspace/jatek-driver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jatek-driver", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/jatek-driver", "run", "serve" ]

[services.env]
PORT = "21669"
BASE_PATH = "/jatek-driver/"
